services:
  lms-app:
    build: .
    container_name: lms-app
    environment:
      - DATABASE_URL="mysql://admin:root@lms-db:3306/lms_trainer"
      - JWT_SECRET="adadw3e12qDFESFAedewr320ekdsa"
      - JWT_EXPIRES_IN="24h"
      - BCRYPT_SALT_ROUNDS=10
    depends_on:
      lms-db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npx prisma generate && npm run start:dev"
    restart: always
    networks:
      - nginx-proxy
      - default

  lms-db:
    image: mysql:8.0
    container_name: lms-db
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=lms_trainer
      - MYSQL_USER=admin
      - MYSQL_PASSWORD=root
    ports:
      - '3306:3306'
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - default

networks:
  nginx-proxy:
    external: true

volumes:
  db_data:
